name: Devblog Pipeline

on:
  schedule:
    - cron: '0 22 * * 0' # 毎週月曜 07:00 JST
  workflow_dispatch:
    inputs:
      since:
        description: '収集対象期間の開始 (ISO 日時、省略可)'
        required: false
      until:
        description: '収集対象期間の終了 (ISO 日時、省略可)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/devblog
    steps:
      - uses: actions/checkout@v4
        with:
          # actions/checkout defaults to a shallow (depth-1) clone, which
          # only contains the single commit that triggered the run. `devblog
          # collect` needs the full commit history to build an accurate
          # weekly digest via `git log --since/--until`.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/devblog/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Run devblog pipeline (collect -> generate -> scan -> publish)
        env:
          DEVBLOG_LLM_API_KEY: ${{ secrets.DEVBLOG_LLM_API_KEY }}
          DEVBLOG_PUBLISH_REPO: ${{ secrets.DEVBLOG_PUBLISH_REPO }}
          DEVBLOG_PUBLISH_REPO_TOKEN: ${{ secrets.DEVBLOG_PUBLISH_REPO_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.since }}" ]; then ARGS="$ARGS --since ${{ github.event.inputs.since }}"; fi
          if [ -n "${{ github.event.inputs.until }}" ]; then ARGS="$ARGS --until ${{ github.event.inputs.until }}"; fi

          # Exit code 3 means the article linter rejected this generation
          # (e.g. a sentence exceeded the length limit) — regenerating
          # produces different prose, so retrying is worthwhile. Any other
          # exit code (missing secret, auth failure, etc.) is a config/code
          # problem that won't be fixed by retrying, so fail immediately.
          # NOTE: `status=$?` must be the line immediately after the command
          # whose exit code we want — any command in between (even `echo`)
          # overwrites `$?`, which previously caused this to always see 0
          # and silently report success without ever creating a PR.
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "::group::devblog run attempt $attempt/$MAX_ATTEMPTS"
            npx tsx src/cli.ts run $ARGS
            status=$?
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if [ "$status" -ne 3 ]; then
              echo "Non-retryable exit code $status; not retrying."
              exit "$status"
            fi
            echo "記事リンター不合格のため再試行します ($attempt/$MAX_ATTEMPTS)"
          done
          echo "記事リンターが $MAX_ATTEMPTS 回連続で不合格でした。"
          exit 3

      - name: Upload digest/draft/scan artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devblog-run-${{ github.run_id }}
          path: |
            tools/devblog/.devblog/digests/
            tools/devblog/.devblog/drafts/
          retention-days: 14
          if-no-files-found: ignore
